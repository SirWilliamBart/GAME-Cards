<div class="pong-card">
  <div class="pong-head">
    <div>
      <div class="pong-title">Pong</div>
      <div class="pong-sub">Click canvas • P1: W/S • P2: ↑/↓ • Space pause • R reset</div>
    </div>
    <div class="pong-score" id="pongScore">0 : 0</div>
  </div>

  <div class="pong-wrap">
    <canvas id="pongCanvas" width="640" height="360" tabindex="0"></canvas>
    <div class="pong-hint" id="pongHint">Click to focus, then play</div>
  </div>
</div>
