<div class="tronRoot">
  <div class="tronTopBar">
    <div class="tronTitle">
      <div class="tronName">TRON — Light Cycles</div>
      <div class="tronHelp">
        P1: WASD · P2: Arrows · R: Restart · Space: Pause
      </div>
    </div>

    <div class="tronStatus">
      <span id="tronStatusText">Press any move key to start</span>
      <button id="tronRestartBtn" class="tronBtn" type="button">Restart</button>
    </div>
  </div>

  <div class="tronStage" id="tronStage">
    <canvas id="tronCanvas"></canvas>
  </div>
</div>
